name: Daily Offline Data Crunching

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 2:00 AM UTC
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  generate-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Snapshot Generator
        env:
          WOOCOMMERCE_STORE_URL: ${{ secrets.WOOCOMMERCE_STORE_URL }}
          WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.WOOCOMMERCE_CONSUMER_KEY }}
          WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.WOOCOMMERCE_CONSUMER_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_snapshot.py

      - name: Commit and Push Cache Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add BackEnd/cache/
          # Only commit if there are changes; prevents pipeline from failing if no new data occurred
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly offline data snapshot update [skip ci]" && git push)